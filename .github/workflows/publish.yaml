name: Publish dashboard

on:
  schedule:
    # everyday at 5am
    - cron: '00 5 * * *'
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Install python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # caching pip dependencies

      - name: Install python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install shinylive python package
        run: python -m pip install shinylive

      # =====================================================
      # Build
      # =====================================================
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: pre-release

      - name: Build page with Quarto
        run: |
          quarto render --output-dir _build

      - name: Create shinylive site
        run: shinylive export _build _site

      # =====================================================
      # Upload _site/ artifact
      # =====================================================
      - name: Upload _site/ artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v2
        with:
          path: "_site/"

  # =====================================================
  # Deploy GitHub Pages site
  # =====================================================
  deploy_gh_pages:
    if: github.ref == 'refs/heads/main'
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
